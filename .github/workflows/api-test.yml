name: Rodiall API Weekly Regression

on:
  schedule:
    # Every Wednesday at 08:00 UTC (09:00 WAT)
    - cron: '0 8 * * 3'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  run-tests:
    name: Newman API Tests
    runs-on: ubuntu-latest
    # Job never fails — notifications always send regardless of test outcome
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        continue-on-error: true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        continue-on-error: true
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        continue-on-error: true

      - name: Run Newman tests
        id: newman
        run: |
          npm test 2>&1 | tee newman-output.txt || true
        continue-on-error: true

      - name: Parse test summary
        id: summary
        continue-on-error: true
        run: |
          OUTPUT=$(cat newman-output.txt 2>/dev/null || echo "No output captured")
          DATE=$(date '+%Y-%m-%d')

          extract() {
            echo "$OUTPUT" | grep -m1 "│ *$1" | grep -Eo "[0-9]+" | paste -sd '/' | head -1
          }

          REQ_RAW=$(extract "requests")
          ASS_RAW=$(extract "assertions")
          SCR_RAW=$(extract "test-scripts")
          DUR=$(echo "$OUTPUT" | grep "total run duration" | grep -Eo "[0-9]+m [0-9.]+s|[0-9.]+s" | head -1)
          AVG=$(echo "$OUTPUT" | grep "average response time" | grep -Eo "\[.+\]" | head -1)

          REQ_EXEC=$(echo "$REQ_RAW" | cut -d'/' -f1)
          REQ_FAIL=$(echo "$REQ_RAW" | cut -d'/' -f2)
          ASS_EXEC=$(echo "$ASS_RAW" | cut -d'/' -f1)
          ASS_FAIL=$(echo "$ASS_RAW" | cut -d'/' -f2)
          SCR_EXEC=$(echo "$SCR_RAW" | cut -d'/' -f1)
          SCR_FAIL=$(echo "$SCR_RAW" | cut -d'/' -f2)

          REQ_PASS=$(( ${REQ_EXEC:-0} - ${REQ_FAIL:-0} ))
          ASS_PASS=$(( ${ASS_EXEC:-0} - ${ASS_FAIL:-0} ))
          SCR_PASS=$(( ${SCR_EXEC:-0} - ${SCR_FAIL:-0} ))

          if [ "${REQ_FAIL:-0}" = "0" ] && [ "${ASS_FAIL:-0}" = "0" ] && [ "${SCR_FAIL:-0}" = "0" ]; then
            ICON="✅"; STATUS="ALL TESTS PASSED"
          else
            ICON="⚠️"; STATUS="SOME TESTS FAILED"
          fi

          # Individual failed test cases
          FAILED_CASES=$(echo "$OUTPUT" | awk '
            /^[[:space:]]+[0-9]+\.[[:space:]]+(AssertionError|JSONError|Error)/ {
              line = $0
              sub(/^[[:space:]]+[0-9]+\.[[:space:]]+(AssertionError|JSONError|Error)[[:space:]]+/, "", line)
              test_name = line
            }
            /inside "/ {
              match($0, /inside "([^"]+)"/, arr)
              if (arr[1] != "") {
                printf "FAIL: %s | %s\n", test_name, arr[1]
                test_name = ""
              }
            }
          ' | head -30)

          # Passed test cases (first 40)
          PASSED_CASES=$(echo "$OUTPUT" | grep -E "^[[:space:]]+✓" | \
            sed 's/^[[:space:]]*✓[[:space:]]*/PASS: /' | head -40)

          echo "icon=$ICON"         >> $GITHUB_OUTPUT
          echo "status=$STATUS"     >> $GITHUB_OUTPUT
          echo "date=$DATE"         >> $GITHUB_OUTPUT
          echo "req_exec=$REQ_EXEC" >> $GITHUB_OUTPUT
          echo "req_pass=$REQ_PASS" >> $GITHUB_OUTPUT
          echo "req_fail=$REQ_FAIL" >> $GITHUB_OUTPUT
          echo "ass_exec=$ASS_EXEC" >> $GITHUB_OUTPUT
          echo "ass_pass=$ASS_PASS" >> $GITHUB_OUTPUT
          echo "ass_fail=$ASS_FAIL" >> $GITHUB_OUTPUT
          echo "scr_exec=$SCR_EXEC" >> $GITHUB_OUTPUT
          echo "scr_pass=$SCR_PASS" >> $GITHUB_OUTPUT
          echo "scr_fail=$SCR_FAIL" >> $GITHUB_OUTPUT
          echo "duration=$DUR"      >> $GITHUB_OUTPUT
          echo "avg=$AVG"           >> $GITHUB_OUTPUT

          {
            echo 'failed_cases<<EOF_FAILED'
            echo "$FAILED_CASES"
            echo 'EOF_FAILED'
          } >> $GITHUB_OUTPUT

          {
            echo 'passed_cases<<EOF_PASSED'
            echo "$PASSED_CASES"
            echo 'EOF_PASSED'
          } >> $GITHUB_OUTPUT

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: rodiall-api-report-${{ github.run_number }}
          path: newman/Rodiall-API-report.html
          retention-days: 30

      # ── EMAIL via Gmail SMTP ────────────────────────────────────────────
      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "${{ steps.summary.outputs.icon }} Rodiall API | ${{ steps.summary.outputs.status }} | Run #${{ github.run_number }} | ${{ steps.summary.outputs.date }}"
          to: >-
            oladimeji.ajayi@fbistech.com,
            eyitemi.abioritsegbemi@fbistech.com,
            gift.alabo@fbistech.com,
            osayuki.aganmwonyi@fbistech.com,
            afolabi.oluwo@fbistech.com
          from: "Rodiall QA Bot <${{ secrets.GMAIL_USER }}>"
          body: |
            ================================================
              RODIALL API AUTOMATED TEST REPORT
            ================================================
              Status     : ${{ steps.summary.outputs.icon }} ${{ steps.summary.outputs.status }}
              Run        : #${{ github.run_number }}
              Date       : ${{ steps.summary.outputs.date }}
              Duration   : ${{ steps.summary.outputs.duration }}
              Avg Resp   : ${{ steps.summary.outputs.avg }}

            ------------------------------------------------
              SUMMARY
            ------------------------------------------------
              Category        Executed   Passed   Failed
              ─────────────────────────────────────────────
              Requests        ${{ steps.summary.outputs.req_exec }}          ${{ steps.summary.outputs.req_pass }}        ${{ steps.summary.outputs.req_fail }}
              Assertions      ${{ steps.summary.outputs.ass_exec }}          ${{ steps.summary.outputs.ass_pass }}        ${{ steps.summary.outputs.ass_fail }}
              Test Scripts    ${{ steps.summary.outputs.scr_exec }}          ${{ steps.summary.outputs.scr_pass }}        ${{ steps.summary.outputs.scr_fail }}

            ------------------------------------------------
              FAILED TEST CASES
            ------------------------------------------------
            ${{ steps.summary.outputs.failed_cases }}

            ------------------------------------------------
              PASSED TEST CASES (first 40)
            ------------------------------------------------
            ${{ steps.summary.outputs.passed_cases }}

            ------------------------------------------------
              FULL HTML REPORT
            ------------------------------------------------
              Download artifact:
              https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

              Collection : Rodiall API (269 requests)
              Schedule   : Every Wednesday 08:00 UTC (09:00 WAT)
            ================================================

      # ── SLACK via Incoming Webhook ──────────────────────────────────────
      - name: Send Slack notification
        continue-on-error: true
        run: |
          # Build compact summary for Slack (safe single-line approach)
          FAILED_TEXT=$(echo "${{ steps.summary.outputs.failed_cases }}" | head -15 | tr '\n' ' | ' | sed 's/ | $//')
          PASSED_TEXT=$(echo "${{ steps.summary.outputs.passed_cases }}" | head -15 | tr '\n' ' | ' | sed 's/ | $//')

          python3 - <<PYEOF
          import json, urllib.request, os

          icon   = "${{ steps.summary.outputs.icon }}"
          status = "${{ steps.summary.outputs.status }}"
          date   = "${{ steps.summary.outputs.date }}"
          run    = "#${{ github.run_number }}"
          dur    = "${{ steps.summary.outputs.duration }}"
          avg    = "${{ steps.summary.outputs.avg }}"

          req_exec = "${{ steps.summary.outputs.req_exec }}"
          req_pass = "${{ steps.summary.outputs.req_pass }}"
          req_fail = "${{ steps.summary.outputs.req_fail }}"
          ass_exec = "${{ steps.summary.outputs.ass_exec }}"
          ass_pass = "${{ steps.summary.outputs.ass_pass }}"
          ass_fail = "${{ steps.summary.outputs.ass_fail }}"
          scr_exec = "${{ steps.summary.outputs.scr_exec }}"
          scr_pass = "${{ steps.summary.outputs.scr_pass }}"
          scr_fail = "${{ steps.summary.outputs.scr_fail }}"
          run_url  = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          failed_raw = """${{ steps.summary.outputs.failed_cases }}"""
          passed_raw = """${{ steps.summary.outputs.passed_cases }}"""

          failed_lines = [l.strip() for l in failed_raw.strip().splitlines() if l.strip()][:15]
          passed_lines = [l.strip() for l in passed_raw.strip().splitlines() if l.strip()][:15]

          failed_text = "\n".join(failed_lines) if failed_lines else "None"
          passed_text = "\n".join(passed_lines) if passed_lines else "None"

          summary_table = (
              f"```"
              f"Category       Exec   Pass   Fail\n"
              f"─────────────────────────────────\n"
              f"Requests       {req_exec:<6} {req_pass:<6} {req_fail}\n"
              f"Assertions     {ass_exec:<6} {ass_pass:<6} {ass_fail}\n"
              f"Test Scripts   {scr_exec:<6} {scr_pass:<6} {scr_fail}"
              f"```"
          )

          payload = {
              "blocks": [
                  {
                      "type": "header",
                      "text": {"type": "plain_text", "text": f"{icon} Rodiall API Tests — {status}"}
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Run:*\n{run}"},
                          {"type": "mrkdwn", "text": f"*Date:*\n{date}"},
                          {"type": "mrkdwn", "text": f"*Duration:*\n{dur}"},
                          {"type": "mrkdwn", "text": f"*Avg Response:*\n{avg}"}
                      ]
                  },
                  {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": f"*SUMMARY*\n{summary_table}"}
                  },
                  {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": f"*FAILED TEST CASES*\n```{failed_text}```"}
                  },
                  {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": f"*PASSED TEST CASES (first 15)*\n```{passed_text}```"}
                  },
                  {
                      "type": "actions",
                      "elements": [{
                          "type": "button",
                          "text": {"type": "plain_text", "text": "📄 Download HTML Report"},
                          "url": run_url
                      }]
                  }
              ]
          }

          data = json.dumps(payload).encode("utf-8")
          req = urllib.request.Request(
              os.environ["SLACK_WEBHOOK_URL"],
              data=data,
              headers={"Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req) as resp:
              print("Slack response:", resp.read().decode())
          PYEOF
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
