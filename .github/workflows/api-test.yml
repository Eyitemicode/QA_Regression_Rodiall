name: Rodiall API Weekly Regression

on:
  schedule:
    # Every Wednesday at 08:00 UTC (09:00 WAT)
    - cron: '0 8 * * 3'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  run-tests:
    name: Newman API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Newman tests
        id: newman
        run: |
          set -o pipefail
          npm test 2>&1 | tee newman-output.txt
        continue-on-error: true   # don't fail the job; let email step always run

      - name: Parse test summary
        id: summary
        run: |
          OUTPUT=$(cat newman-output.txt)

          get_stat() {
            echo "$OUTPUT" | grep -A2 "$1" | grep -Eo "[0-9]+" | head -2 | paste -sd '/'
          }

          REQUESTS=$(get_stat "requests")
          ASSERTIONS=$(get_stat "assertions")
          SCRIPTS=$(get_stat "test-scripts")
          DURATION=$(echo "$OUTPUT" | grep "total run duration" | grep -Eo "[0-9]+m [0-9.]+s|[0-9.]+s" | head -1)
          AVG=$(echo "$OUTPUT" | grep "average response time" | sed 's/.*average response time: //' | tr -d '│')

          REQ_FAIL=$(echo "$REQUESTS"  | cut -d'/' -f2)
          A_FAIL=$(echo "$ASSERTIONS"  | cut -d'/' -f2)
          S_FAIL=$(echo "$SCRIPTS"     | cut -d'/' -f2)

          if [ "${REQ_FAIL:-0}" = "0" ] && [ "${A_FAIL:-0}" = "0" ] && [ "${S_FAIL:-0}" = "0" ]; then
            STATUS="ALL TESTS PASSED"
            ICON="✅"
          else
            STATUS="SOME TESTS FAILED"
            ICON="⚠️"
          fi

          # Top failures (up to 20 lines)
          FAILURES=$(echo "$OUTPUT" | awk '/^   #  failure/,0' | head -60 | \
            grep -E "AssertionError|JSONError|Error$|inside" | head -20 | sed 's/^/  /')

          echo "status=$ICON $STATUS"                    >> $GITHUB_OUTPUT
          echo "requests=$REQUESTS"                      >> $GITHUB_OUTPUT
          echo "assertions=$ASSERTIONS"                  >> $GITHUB_OUTPUT
          echo "scripts=$SCRIPTS"                        >> $GITHUB_OUTPUT
          echo "duration=$DURATION"                      >> $GITHUB_OUTPUT
          echo "avg=$AVG"                                >> $GITHUB_OUTPUT

          # Multi-line safe for GITHUB_OUTPUT
          {
            echo 'failures<<FAILURES_EOF'
            echo "$FAILURES"
            echo 'FAILURES_EOF'
          } >> $GITHUB_OUTPUT

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: rodiall-api-report-${{ github.run_number }}
          path: newman/Rodiall-API-report.html
          retention-days: 30

      - name: Send email report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "${{ steps.summary.outputs.status }} | Rodiall API Tests | Run #${{ github.run_number }} | ${{ steps.summary.outputs.duration }}"
          to: >-
            oladimeji.ajayi@fbistech.com,
            eyitemi.abioritsegbemi@fbistech.com,
            gift.alabo@fbistech.com,
            osayuki.aganmwonyi@fbistech.com,
            afolabi.oluwo@fbistech.com
          from: "Rodiall QA Bot <${{ secrets.SMTP_USERNAME }}>"
          body: |
            ========================================
            RODIALL API AUTOMATED TEST REPORT
            ========================================

            Status:        ${{ steps.summary.outputs.status }}
            Run Number:    #${{ github.run_number }}
            Duration:      ${{ steps.summary.outputs.duration }}
            Avg Response:  ${{ steps.summary.outputs.avg }}

            ----------------------------------------
            TEST RESULTS
            ----------------------------------------
            Requests:      ${{ steps.summary.outputs.requests }}   (executed / failed)
            Assertions:    ${{ steps.summary.outputs.assertions }}   (executed / failed)
            Test Scripts:  ${{ steps.summary.outputs.scripts }}   (executed / failed)

            ----------------------------------------
            FAILURE DETAILS
            ----------------------------------------
            ${{ steps.summary.outputs.failures }}

            ----------------------------------------
            FULL REPORT
            ----------------------------------------
            HTML report uploaded as artifact — download from:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Collection : Rodiall API (269 requests)
            Schedule   : Every Wednesday 08:00 UTC
            ========================================
